<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <meta http-equiv="refresh" content="0; url=/netflix/" />
    <script>
      const target = `/netflix/${window.location.search || ""}${window.location.hash || ""}`;
      window.location.replace(target);
    </script>
  </head>
  <body>
    <p>
      <a href="/netflix/">Netflixページへ移動</a>
    </p>
  </body>
</html>
